version: "3.9"

services:
  backend:
    build: ./Desafio-backend
    ports:
      - "3000:3000"
    volumes:
      - ./Desafio-backend:/app
      - /app/node_modules
    working_dir: /app
    command: sh start.sh
    environment:
      JWT_PASS: ${JWT_PASS:-default_secret}
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
       DB_HOST: db
       DB_PORT: 5432
       DB_USER: ${DB_USER:-postgres}
       DB_PASSWORD: ${DB_PASSWORD:-postgres}
       DB_DATABASE: ${DB_DATABASE:-meu_banco}
    restart: always